; PlatformIO Project Configuration File

[env:sipeed-maix-go]
platform = kendryte210
board = sipeed-maix-go
framework = arduino

[env:yehuo]
platform = kendryte210
board = yehuo_k210
framework = arduino
build_type = debug
monitor_speed = 115200
; lib_extra_dirs removed (PlatformIO auto-manages framework libs)
; build_flags for project include removed — PlatformIO adds `include/` automatically
build_flags =
    -D APP_LOG_LEVEL=4
build_src_flags =
    -Wall
    -Wextra
    -Werror
lib_deps =
    lvgl/lvgl@^9.5.0
lib_ignore =
    SD

